name: Build Windows 7 Compatible EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest # Возвращаем быстрый современный сервер

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10' # Но Python оставляем старый, для Win 7

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "pyinstaller<6.0"

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile ozonanalytics.py

    - name: Upload Artifact (Save EXE)
      uses: actions/upload-artifact@v4
      with:
        name: ozonanalytics-win7-exe
        path: dist/ozonanalytics.exe
