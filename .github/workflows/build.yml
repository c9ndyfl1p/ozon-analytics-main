name: Build Windows 10/11 EXE (No Console)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install pandas matplotlib openpyxl pillow

    - name: Build EXE with PyInstaller (Hide Console)
      run: |
        pyinstaller --onefile --noconsole ozonanalytics.py

    - name: Upload Artifact (Save EXE)
      uses: actions/upload-artifact@v4
      with:
        name: ozonanalytics-windows-exe
        path: dist/ozonanalytics.exe
